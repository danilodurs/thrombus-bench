# Hyperparameters for the neural surrogate (src/thrombus_bench/neural/*) and
# for the dataset generation / split used to train and evaluate it.

seed: 0

data:
  dataset_dir: data/processed
  # Reduced-scale demo defaults (see README.md "Project status" /
  # "How to run"): a full-scale run per the original project scope would
  # use O(100-1000) samples (n_train: 700, n_val: 150, n_test: 150 or
  # similar) and O(10-100x) more training epochs below; these smaller
  # defaults keep `thrombus-generate-dataset` + `thrombus-train` +
  # `thrombus-benchmark` runnable end-to-end in a few minutes on CPU.
  n_train: 24
  n_val: 6
  n_test: 6
  # Explicit edge-of-domain holdout split (still drawn from the same sampled
  # distribution, not a different population): parameter combinations at the
  # extremes of the sampled ranges (see data/sampler.py), held out from
  # train/val entirely and evaluated separately in
  # benchmark/edge_holdout_eval.py.
  n_edge_holdout: 6
  edge_holdout_quantile: 0.9   # samples in the outer (1-quantile) tail of
                               # platelet/heparin/inlet-velocity ranges are
                               # routed to n_edge_holdout

model:
  # Geometry/parameter encoder -> latent grid (encoder.py). latent_grid_size
  # must match the grid_size used by data/generate_dataset.py to rasterize
  # the mechanistic solver's output (default 32x32; see its --grid-size flag).
  encoder:
    param_dim: 8            # data/generate_dataset.PARAM_ORDER: [aneurysm_d, vessel_d, v_in, platelet_conc, heparin_conc, PT, AT, FG]
    latent_grid_size: [32, 32]
    hidden_channels: 32
    n_layers: 2

  # Operator core (operator_core.py): "fno" (Fourier Neural Operator) is
  # implemented; "gnn" (message-passing graph network on the FEM mesh) is a
  # documented-but-not-implemented extension point -- see operator_core.py.
  operator_core:
    type: fno
    fno:
      modes: 8
      hidden_channels: 32
      n_layers: 3
    gnn:
      hidden_channels: 32
      n_message_passing_steps: 6

  # Output channels, matching data/dataset.FIELD_NAMES: velocity_x,
  # velocity_y, conc_RP, conc_AP, conc_APR, conc_APS, conc_T, conc_AT,
  # conc_PT, conc_FG, conc_FI.
  output_channels: 11

  uncertainty:
    method: deep_ensemble    # "deep_ensemble" or "mc_dropout"
    n_ensemble_members: 3    # reduced from a typical 5-10 for demo-scale runtime
    mc_dropout_rate: 0.1
    mc_dropout_n_samples: 30

physics_loss:
  enabled: true
  # Whether PDE residuals are computed via autograd on a continuous
  # (coordinate -> field) reparameterization of the network output, or via
  # finite differences on the regular latent grid. See
  # neural/physics_losses.py docstring.
  residual_mode: finite_difference   # "autograd" or "finite_difference"
  # Only mass_conservation and nonnegativity are implemented in
  # neural/physics_losses.py's total_physics_loss. navier_stokes_residual is
  # implemented but not wired in there -- besides a viscosity scalar, it
  # needs a predicted pressure field that the surrogate doesn't output (no
  # entry in data/dataset.FIELD_NAMES); cdr_residual and
  # surface_flux_bc_residual are unimplemented placeholders. See that
  # module's docstring. Weight entries for these are omitted here since
  # train.py's weights.get(name, 0.0) would silently ignore them anyway.
  weights:
    data: 1.0
    mass_conservation: 0.05
    nonnegativity: 0.1

optim:
  epochs: 40   # reduced from a typical 200+ for demo-scale runtime; see data: note above
  batch_size: 16
  lr: 3.0e-4
  weight_decay: 1.0e-5
  optimizer: adamw
  lr_schedule: cosine
  grad_clip_norm: 1.0
  early_stopping_patience: 20

logging:
  backend: csv       # "csv" or "tensorboard"
  log_dir: runs/
  checkpoint_dir: checkpoints/
  log_every_n_steps: 10
